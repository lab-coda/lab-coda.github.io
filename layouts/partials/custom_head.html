<!-- some ways to find the lab manual -->
<script>
     function openManual() {
          const a = document.createElement('a');
          a.href = 'https://lab-manual.pages.dev/';
          a.target = '_blank';
          a.click();
     }

     (function() {
          const seq = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
          let idx = 0;
          document.addEventListener('keydown', function(e) {
               if (e.key === seq[idx]) {
                    idx++;
                    if (idx === seq.length) {
                         openManual();
                         idx = 0;
                    }
               } else {
                    idx = (e.key === seq[0]) ? 1 : 0;
               }
          });
     })();

     (function() {
          const keyword = 'coda';
          let typed = '';
          document.addEventListener('keydown', function(e) {
               typed += e.key.toLowerCase();
               if (typed.length > keyword.length) typed = typed.slice(-keyword.length);
               if (typed === keyword) {
                    openManual();
                    typed = '';
               }
          });
     })();

     (function() {
          const style = 'color: #61a8ff; font-weight: bold; font-size: 14px;';
          console.log('%c🎹 some keys unlock things', style);
          console.log('%c🎵 some words open doors', style);
          console.log('%c🎤 some will never run around and desert you', style);
          window.getLabManual = function() {
               openManual();
          };
     })();

     document.addEventListener('DOMContentLoaded', function() {
          const target = document.querySelector('.blog-title');
          target.setAttribute('title', 'try clicking a few times');

          // five click
          const clicks = 5;
          let count = 0;
          let timer;
          target.addEventListener('click', function() {
               count++;
               clearTimeout(timer);
               if (count === clicks) {
                    openManual();
                    count = 0;
               } else {
                    timer = setTimeout(function() { count = 0; }, 1500);
               }
          });

          // double click
          target.addEventListener('dblclick', function() {
               const overlay = document.createElement('div');
               overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:#000;';
               overlay.innerHTML = '<iframe width="100%" height="100%" src="https://www.youtube.com/embed/xvFZjo5PgG0?autoplay=1" frameborder="0" allow="autoplay" allowfullscreen></iframe>'
                    + '<button onclick="this.parentElement.remove()" style="position:absolute;top:12px;right:16px;z-index:10000;background:rgba(0,0,0,0.6);color:#fff;border:none;font-size:24px;cursor:pointer;padding:4px 10px;">✕</button>';
               document.body.appendChild(overlay);
          });

          // for mobile user
          let pressTimer;
          target.addEventListener('touchstart', function() {
               pressTimer = setTimeout(function() {
                    const toast = document.createElement('div');
                    toast.textContent = 'try tapping a few times...';
                    toast.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:#fff;padding:8px 16px;border-radius:20px;font-size:14px;z-index:9999;pointer-events:none;';
                    document.body.appendChild(toast);
                    setTimeout(function() { toast.remove(); }, 2500);
               }, 600);
          });
          target.addEventListener('touchend', function() { clearTimeout(pressTimer); });
          target.addEventListener('touchmove', function() { clearTimeout(pressTimer); });
          target.addEventListener('touchcancel', function() { clearTimeout(pressTimer); });

     });
</script>
